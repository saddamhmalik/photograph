services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: photographer
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_USER: photographer
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${PUBLIC_URL:-http://localhost:8080}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost:8080}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost:8080}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_DOMAIN:-localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: photographer
      DB_USERNAME: photographer
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: r2
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      PHOTOGRAPHER_ID: ${PHOTOGRAPHER_ID:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_URL:-http://localhost:8080}
        NEXT_PUBLIC_CDN_URL: ${R2_PUBLIC_URL}
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      API_BACKEND_URL: http://backend:8000
      API_INTERNAL_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_CDN_URL: ${R2_PUBLIC_URL}
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      CERT_DOMAIN: ${CERT_DOMAIN:-photo.codikal.com}
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    depends_on:
      - frontend
      - backend

  certbot:
    profiles:
      - cert
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt

volumes:
  mysql_data:
  redis_data:
  certbot-www:
  certbot-conf:
