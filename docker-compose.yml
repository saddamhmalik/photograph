services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: photographer
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: photographer
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-}
      APP_URL: http://localhost:8000
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:3000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: photographer
      DB_USERNAME: photographer
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILESYSTEM_DISK: r2
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      FRONTEND_URL: http://localhost:3000
      PHOTOGRAPHER_ID: ${PHOTOGRAPHER_ID:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: /api/v1
      API_BACKEND_URL: http://backend:8000
      API_INTERNAL_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_CDN_URL: ${R2_PUBLIC_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
  redis_data:
